name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install ...
        2. Run ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Environment
      description: Versions involved.
      placeholder: |
        Magento: 2.4.x
        PHP: 8.x
        Node: 22.x
        mage-obsidian packages: 2.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant build output, browser console errors or Magento logs.
      render: shell
